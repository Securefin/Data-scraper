# .github/workflows/scraper.yml
name: Dental Scraper

on:
  schedule:
    - cron: "0 3 * * *"      # IST 8:30 AM  (UTC 03:00)
    - cron: "0 15 * * *"     # IST 8:30 PM  (UTC 15:00)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 38      # 2min setup + 30min scraping + 6min buffer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # FIX 1: Cache key mein playwright version bhi include karo
      # Taaki playwright upgrade ke baad purana browser cache use na ho
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pip index versions playwright 2>/dev/null | head -1 | grep -oP '[\d.]+'| head -1 || echo 'latest')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}-
            playwright-chromium-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # FIX 2: playwright install-deps sudo issue fix — system python use karo
      - name: Install Playwright + Chromium
        run: |
          pip install --upgrade playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # FIX 3: crawl4ai install optional banaya — agar fail ho toh workflow na ruke
      - name: Setup Crawl4AI (optional)
        run: python -m crawl4ai.install || echo "crawl4ai setup skipped"

      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          RUN_MINUTES: 30
        run: python scraper.py

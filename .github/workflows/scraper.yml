# .github/workflows/scraper.yml

name: Dental Scraper

on:
  schedule:
    # Din mein 4 baar — har 6 ghante mein (UTC time)
    - cron: "0 1 * * *"    # IST 6:30 AM
    - cron: "0 7 * * *"    # IST 12:30 PM
    - cron: "0 13 * * *"   # IST 6:30 PM
    - cron: "0 19 * * *"   # IST 12:30 AM
  workflow_dispatch:        # Manual trigger bhi possible

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # 10 min scraping + 5 min setup buffer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install --upgrade playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          RUN_MINUTES: "10"
        run: python scraper.py

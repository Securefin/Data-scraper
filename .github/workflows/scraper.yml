# .github/workflows/scraper.yml
name: Dental Scraper

on:
  schedule:
    - cron: "0 3 * * *"     # IST 8:30 AM
    - cron: "0 15 * * *"    # IST 8:30 PM
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 38      # 2min setup + 30min scraping + 6min buffer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install --upgrade playwright
          python -m playwright install chromium
          sudo $(which python) -m playwright install-deps chromium
          python -m crawl4ai.install  # Crawl4AI browser setup

      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          RUN_MINUTES: 30
        run: python scraper.py
